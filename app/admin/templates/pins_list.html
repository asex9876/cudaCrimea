{% extends 'base.html' %}
{% block content %}
<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <h2>Пины (выделение карточек)</h2>
    <a class="btn" href="/pins/new">Добавить</a>
  </div>
  <table>
    <thead><tr><th>Тип</th><th>Город</th><th>Период</th><th>Приоритет</th><th>Item ID</th><th></th></tr></thead>
    <tbody>
      {% for p in items %}
      <tr>
        <td>{{ p.item_type }}</td>
        <td>{{ p.city }}</td>
        <td>{{ p.active_from }} — {{ p.active_to }}</td>
        <td>{{ p.priority }}</td>
        <td>{{ p.item_id }}</td>
        <td>
          <a class="btn" href="/pins/{{ p.id }}">Редактировать</a>
          <form method="post" action="/pins/{{ p.id }}/delete" style="display:inline;">
            <input type="hidden" name="csrf" value="{{ csrf }}" />
            <button class="btn" type="submit">Удалить</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
