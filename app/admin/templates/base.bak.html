<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or 'Admin' }}</title>
    <style>
      :root { --bg:#0b1020; --card:#121a33; --muted:#9aa4b2; --fg:#e5e9f0; --accent:#6ea8fe; }
      body { background:var(--bg); color:var(--fg); font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; margin:0; }
      a{ color:var(--accent); text-decoration:none; }
      header { padding:1rem 1.25rem; background:#0f162e; border-bottom:1px solid #1b254b; }
      nav a { margin-right:1rem; }
      .wrap { padding:1rem; }
      .card { background:var(--card); border:1px solid #1b254b; border-radius:12px; padding:1rem; }
      table { width:100%; border-collapse:collapse; }
      th, td { padding:.5rem .75rem; border-bottom:1px solid #1b254b; vertical-align:top; }
      input, select, textarea { background:#0b1226; color:var(--fg); border:1px solid #1b254b; border-radius:8px; padding:.5rem .6rem; width:100%; }
      .btn { background:#1b254b; border:1px solid #2a386a; color:var(--fg); padding:.4rem .8rem; border-radius:8px; cursor:pointer; }
      .row { display:flex; gap:1rem; flex-wrap:wrap; }
      .col { flex:1 1 320px; }
      .muted { color:var(--muted); font-size:.9rem; }
      .mt1{ margin-top:1rem; }
      .right { text-align:right; }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <a href="/admin/ugc">UGC</a>
        <a href="/admin/ads">Реклама</a>
        <a href="/admin/events">События</a>
        <a href="/admin/places">Места</a>
        <a href="/admin/pins">Пины</a>
        <a href="/admin/stats">Статистика</a>
        <a href="/admin/settings">Настройки</a>
        <a href="/admin/logout" style="float:right">Выход</a>
      </nav>
    </header>
    <div class="wrap">
      {% block content %}{% endblock %}
    </div>
  </body>
  </html>
