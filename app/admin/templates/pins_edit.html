{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width:900px;">
  <h2>{{ 'Новый пин' if not item else 'Редактирование пина' }}</h2>
  <form method="post" action="/pins/save">
    <input type="hidden" name="csrf" value="{{ csrf }}" />
    {% if item %}<input type="hidden" name="id" value="{{ item.id }}" />{% endif %}
    <div class="row">
      <div class="col"><label>Тип (event/place)</label><input name="item_type" value="{{ item.item_type if item else '' }}" /></div>
      <div class="col"><label>Item ID (UUID)</label><input name="item_id" value="{{ item.item_id if item else '' }}" /></div>
    </div>
    <div class="row mt1">
      <div class="col"><label>Город</label><input name="city" value="{{ item.city if item else '' }}" /></div>
      <div class="col"><label>Заголовок (override)</label><input name="title_override" value="{{ item.title_override if item else '' }}" /></div>
    </div>
    <div class="row mt1">
      <div class="col"><label>Активен с</label><input name="active_from" type="date" value="{{ item.active_from if item else '' }}" /></div>
      <div class="col"><label>Активен до</label><input name="active_to" type="date" value="{{ item.active_to if item else '' }}" /></div>
      <div class="col"><label>Приоритет</label><input name="priority" type="number" value="{{ item.priority if item else 0 }}" /></div>
    </div>
    <div class="mt1 right"><button class="btn" type="submit">Сохранить</button></div>
  </form>
</div>
{% endblock %}
