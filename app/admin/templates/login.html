{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width:560px;">
  <h2>Вход в админку</h2>
  {% if error %}<p style="color:#ff6b6b;">{{ error }}</p>{% endif %}
  <form method="post" action="/login">
    <input type="hidden" name="csrf" value="{{ csrf }}" />
    <div class="row">
      <div class="col">
        <label>Логин</label>
        <input name="username" />
      </div>
      <div class="col">
        <label>Пароль</label>
        <input name="password" type="password" />
      </div>
    </div>
    <div class="mt1">
      <label>Или токен</label>
      <input name="token" />
    </div>
    <div class="mt1 right"><button class="btn" type="submit">Войти</button></div>
  </form>
</div>
{% endblock %}
