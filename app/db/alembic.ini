[alembic]
script_location = app/db/alembic
sqlalchemy.url = postgresql+asyncpg://postgres:postgres@localhost:5432/cudacrimea

# Logging config can be overridden by structlog; keep minimal here.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(message)s
datefmt = %H:%M:%S

