version: '3.8'

networks:
  infra_appnet:
    driver: bridge
    name: infra_appnet

volumes:
  pgdata:
    name: pgdata
  redisdata:
    name: redisdata

services:
  db:
    image: postgres:15
    container_name: cuda_db
    environment:
      POSTGRES_DB: cudacrimea
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - infra_appnet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: cuda_redis
    networks:
      - infra_appnet
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    image: infra-api
    container_name: cuda_api
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/cudacrimea
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - infra_appnet
    ports:
      - "8000:8000"
    volumes:
      - .:/app:rw
    restart: unless-stopped
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.worker
    image: infra-worker
    container_name: cuda_worker
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/cudacrimea
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - infra_appnet
    volumes:
      - .:/app:rw
    restart: unless-stopped
    command: python -m app.ingestors.worker
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  bot:
    build:
      context: .
      dockerfile: infra/Dockerfile.bot
    image: infra-bot
    container_name: cuda_bot
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql+asyncpg://postgres:${DB_PASSWORD}@db:5432/cudacrimea
      - REDIS_URL=redis://redis:6379/0
      - API_HOST=api
      - API_PORT=8000
      - BOT_TOKEN=${BOT_TOKEN}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - infra_appnet
    volumes:
      - .:/app:rw
    restart: unless-stopped
    command: python -m app.bot.main
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.25
    container_name: cuda_nginx
    depends_on:
      api:
        condition: service_started
    networks:
      - infra_appnet
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/nginx.htpasswd:/etc/nginx/conf.d/htpasswd:ro
      - ./app/admin/static:/usr/share/nginx/html/static:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
