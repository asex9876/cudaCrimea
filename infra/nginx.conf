upstream api_upstream { server api:8000; }

# Rate limiting for /api
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types text/plain application/json application/javascript text/css application/xml text/xml image/svg+xml;

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Use Docker DNS for dynamic container IP resolution when using variables
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $api_upstream http://api:8000;

    # Proxy to API for /api and /metrics
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /metrics {
        proxy_pass $api_upstream/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static files (photos uploaded by users)
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Admin static files - no auth required (browser loads these after HTML auth)
    location /admin/static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Uploaded files (Telegram photos, etc.)
    location /uploads/ {
        proxy_pass $api_upstream/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin with basic auth
    location /admin/ {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/conf.d/htpasswd;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Remote-User $remote_user;  # Pass authenticated username
    }

    # Fallback to API root
    location / {
        proxy_pass $api_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
