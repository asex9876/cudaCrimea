networks:
  appnet:

volumes:
  pgdata:
  redisdata:
  uploads:  # Для загруженных фотографий

services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: cuda_api
    env_file:
      - ../.env
    environment:
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appnet
    volumes:
      - ..:/app:rw
      - uploads:/app/app/uploads  # Персистентное хранение загруженных файлов
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000

  bot:
    build:
      context: ..
      dockerfile: infra/Dockerfile.bot
    container_name: cuda_bot
    env_file:
      - ../.env
    environment:
      - API_HOST=api
      - API_PORT=8000
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - appnet
    volumes:
      - ..:/app:rw
    restart: unless-stopped
    command: python -m app.bot.main

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    container_name: cuda_worker
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - appnet
    volumes:
      - ..:/app:rw
      - uploads:/app/app/uploads  # Доступ к загруженным файлам
    restart: unless-stopped
    command: python -m app.ingestors.worker

  db:
    image: postgres:15
    container_name: cuda_db
    environment:
      POSTGRES_DB: cudacrimea
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}  # Используем переменную окружения
    networks:
      - appnet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: cuda_redis
    networks:
      - appnet
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.25
    container_name: cuda_nginx
    depends_on:
      api:
        condition: service_healthy
    networks:
      - appnet
    ports:
      - "80:80"
      - "443:443"  # Для HTTPS (требуется настройка SSL)
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx.htpasswd:/etc/nginx/conf.d/htpasswd:ro
      - ../app/admin/static:/usr/share/nginx/html/static:ro
      # - ./ssl:/etc/nginx/ssl:ro  # Раскомментируйте для HTTPS
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
