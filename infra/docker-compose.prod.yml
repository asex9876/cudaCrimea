# ========================================
# Production Docker Compose Configuration
# ========================================
# Использование: docker-compose -f docker-compose.prod.yml up -d
# Обновление: docker-compose -f docker-compose.prod.yml restart
# ========================================

networks:
  appnet:

volumes:
  pgdata:
  redisdata:
  static_uploads:

services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: cuda_api
    env_file:
      - ../.env
    environment:
      - PYTHONPATH=/app
    depends_on:
      - db
      - redis
    networks:
      - appnet
    volumes:
      # Монтируем весь код для возможности разработки на сервере
      - ..:/app:rw
    restart: unless-stopped
    command: uvicorn app.admin.main:app --host 0.0.0.0 --port 8000 --workers 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  bot:
    build:
      context: ..
      dockerfile: infra/Dockerfile.bot
    container_name: cuda_bot
    env_file:
      - ../.env
    environment:
      - API_HOST=api
      - API_PORT=8000
    depends_on:
      - api
      - redis
    networks:
      - appnet
    volumes:
      # Монтируем код и uploads для доступа к загруженным фото
      - ..:/app:rw
    restart: unless-stopped
    command: python -m app.bot.main

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    container_name: cuda_worker
    env_file:
      - ../.env
    depends_on:
      - redis
      - db
    networks:
      - appnet
    volumes:
      - ..:/app:rw
    restart: unless-stopped
    command: python -m app.ingestors.worker

  db:
    image: postgres:15
    container_name: cuda_db
    environment:
      POSTGRES_DB: cudacrimea
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - appnet
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    # Порты НЕ открываем - база доступна только внутри Docker сети
    command: postgres -c max_connections=200 -c shared_buffers=256MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: cuda_redis
    networks:
      - appnet
    volumes:
      - redisdata:/data
    restart: unless-stopped
    # Порты НЕ открываем - redis доступен только внутри Docker сети
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.25
    container_name: cuda_nginx
    depends_on:
      - api
    networks:
      - appnet
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx.htpasswd:/etc/nginx/conf.d/htpasswd:ro
      - ../app/admin/static:/usr/share/nginx/html/static:ro
      # Для SSL сертификатов (когда будут)
      # - ./ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
