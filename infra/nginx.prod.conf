upstream api_upstream {
    server api:8000;
    keepalive 32;
}

# Rate limiting for /api
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

gzip on;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types text/plain application/json application/javascript text/css application/xml text/xml image/svg+xml;

# HTTP server (будет редиректить на HTTPS после установки SSL)
server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Use Docker DNS for dynamic container IP resolution
    resolver 127.0.0.11 ipv6=off valid=30s;
    set $api_upstream http://api:8000;

    # Health check endpoint (для мониторинга)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Static files (photos uploaded by users)
    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Разрешаем большие файлы
        client_max_body_size 10M;
    }

    # API endpoints
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймауты для длинных запросов
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Metrics (закрыть от внешнего доступа!)
    location /metrics {
        # Разрешаем только с localhost (для мониторинга)
        allow 127.0.0.1;
        deny all;

        proxy_pass $api_upstream/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin static uploads (NO AUTH - для отображения изображений в очереди UGC)
    location /admin/static/uploads/ {
        rewrite ^/admin/static/(.*) /static/$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        expires 7d;
        add_header Cache-Control "public";
    }

    # Admin panel with basic auth
    location /admin/ {
        auth_basic "Restricted Area";
        auth_basic_user_file /etc/nginx/conf.d/htpasswd;

        rewrite ^/admin/(.*) /$1 break;
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Разрешаем загрузку больших файлов в админке
        client_max_body_size 50M;
    }

    # Fallback to API root
    location / {
        proxy_pass $api_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

